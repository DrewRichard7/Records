<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Records{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', path='favicon.svg') }}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{{ url_for('static', path='apple-touch-icon.png') }}">
  <link rel="manifest" href="{{ url_for('static', path='site.webmanifest') }}">
  <meta name="theme-color" content="#151925">
  <meta name="apple-mobile-web-app-title" content="Records">
  <script>
    (() => {
      const root = document.documentElement;
      const readPreference = (key, fallback) => {
        try {
          return localStorage.getItem(key) || fallback;
        } catch {
          return fallback;
        }
      };
      const supportedThemes = ["default", "tokyonight", "gruvbox", "ravelry", "miasma", "zen"];
      const mode = readPreference("records-color-mode", "dark");
      const theme = readPreference("records-theme", "default");
      root.dataset.theme = supportedThemes.includes(theme) ? theme : "default";
      root.dataset.colorMode = mode === "light" ? "light" : "dark";
    })();
  </script>
  <link rel="stylesheet" href="{{ url_for('static', path='css/records.css') }}?v=color-schemes-1">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="{{ url_for('static', path='js/records.js') }}?v=color-schemes-1" defer></script>
</head>
<body>
  <header class="topbar command-topbar">
    <button class="icon-button menu-toggle" type="button" aria-label="Menu" aria-expanded="false" aria-controls="main-menu" data-menu-toggle>☰</button>
    <a class="archive-mark" href="/">
      <strong>Records</strong>
      <span>Private archive</span>
    </a>
  </header>
  <nav class="command-menu" id="main-menu" aria-label="Main navigation" data-menu>
    <p class="terminal-prompt">&gt; menu</p>
    <div class="command-menu-grid">
      <a class="button secondary" href="/">Home</a>
      <a class="button secondary" href="/categories">Categories</a>
      <a class="button secondary" href="/search" data-open-search>Search</a>
      <div class="theme-menu-group">
        <p class="caption">Mode</p>
        <div class="segmented theme-mode-control" aria-label="Color mode">
          <button type="button" data-theme-mode-option="dark" aria-pressed="true">Dark</button>
          <button type="button" data-theme-mode-option="light" aria-pressed="false">Light</button>
        </div>
      </div>
      <div class="theme-menu-group">
        <label class="caption" for="theme-scheme">Scheme</label>
        <select id="theme-scheme" data-theme-scheme>
          <option value="default">Default</option>
          <option value="tokyonight">Tokyonight</option>
          <option value="gruvbox">Gruvbox</option>
          <option value="ravelry">Ravelry</option>
          <option value="miasma">Miasma</option>
          <option value="zen">Zen</option>
        </select>
      </div>
      {% if request.url.path not in ["/login", "/forgot-password", "/reset-password"] %}
        <form action="/logout" method="post">
          <button class="button secondary" type="submit">Log out</button>
        </form>
      {% endif %}
    </div>
  </nav>
  <button class="menu-backdrop" type="button" aria-label="Close menu" data-menu-backdrop></button>
  <section class="search-modal" aria-hidden="true" data-search-modal>
    <button class="search-modal-backdrop" type="button" aria-label="Close search" data-close-search></button>
    <div class="search-modal-panel" role="dialog" aria-modal="true" aria-label="Archive search">
      <div class="search-modal-head">
        <p class="terminal-prompt">&gt; search</p>
        <button class="link-button" type="button" data-close-search>Close</button>
      </div>
      <form class="modal-search-form" action="/search" method="get">
        <input type="hidden" name="picker" value="true">
        <input class="search-input" type="search" name="q" placeholder="Search archive..." value="" autocomplete="off" autocapitalize="none" spellcheck="false" hx-get="/search" hx-target="#global-search-results" hx-trigger="input changed delay:100ms, search" hx-include="closest form" data-primary-search data-command-search>
      </form>
      <div id="global-search-results" class="command-search-results"></div>
    </div>
  </section>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <nav class="floating-action-menu" aria-label="Quick actions" data-floating-actions>
    <a class="floating-action-item action-new-entry" href="/entries/new">New entry</a>
    <a class="floating-action-item action-new-category" href="/categories/new">New category</a>
    <a class="floating-action-item action-home" href="/">Home</a>
    <a class="floating-action-item action-search" href="/search" data-open-search>Search</a>
    <button class="floating-action-toggle" type="button" aria-label="Open quick actions" aria-expanded="false" data-floating-actions-toggle>
      <img src="{{ url_for('static', path='apple-touch-icon.png') }}" alt="">
    </button>
  </nav>
</body>
</html>
