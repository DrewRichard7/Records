<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Records{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', path='favicon.svg') }}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{{ url_for('static', path='apple-touch-icon.png') }}">
  <link rel="manifest" href="{{ url_for('static', path='site.webmanifest') }}">
  <meta name="theme-color" content="#151925">
  <meta name="apple-mobile-web-app-title" content="Records">
  <link rel="stylesheet" href="{{ url_for('static', path='css/records.css') }}">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="{{ url_for('static', path='js/records.js') }}" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">Records</a>
    <nav class="navlinks" aria-label="Main navigation">
      <a href="/categories">Categories</a>
      <a href="/entries/new">New entry</a>
      <a href="/categories/new">New category</a>
      <a href="/search">Search</a>
      <form action="/logout" method="post">
        <button class="link-button" type="submit">Log out</button>
      </form>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
