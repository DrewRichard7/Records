<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Records{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', path='favicon.svg') }}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{{ url_for('static', path='apple-touch-icon.png') }}">
  <link rel="manifest" href="{{ url_for('static', path='site.webmanifest') }}">
  <meta name="theme-color" content="#151925">
  <meta name="apple-mobile-web-app-title" content="Records">
  <link rel="stylesheet" href="{{ url_for('static', path='css/records.css') }}?v=command-search-4">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="{{ url_for('static', path='js/records.js') }}?v=command-search-4" defer></script>
</head>
<body>
  <header class="topbar command-topbar">
    <button class="icon-button menu-toggle" type="button" aria-label="Menu" aria-expanded="false" aria-controls="main-menu" data-menu-toggle>☰</button>
    <a class="archive-mark" href="/">
      <strong>Records</strong>
      <span>Private archive</span>
    </a>
  </header>
  <nav class="command-menu" id="main-menu" aria-label="Main navigation" data-menu>
    <p class="terminal-prompt">&gt; menu</p>
    <div class="command-menu-grid">
      <a class="button secondary" href="/">Home</a>
      <a class="button secondary" href="/categories">Categories</a>
      <a class="button secondary" href="/search" data-open-search>Search</a>
      {% if request.url.path not in ["/login", "/forgot-password", "/reset-password"] %}
        <form action="/logout" method="post">
          <button class="button secondary" type="submit">Log out</button>
        </form>
      {% endif %}
    </div>
  </nav>
  <button class="menu-backdrop" type="button" aria-label="Close menu" data-menu-backdrop></button>
  <section class="search-modal" aria-hidden="true" data-search-modal>
    <button class="search-modal-backdrop" type="button" aria-label="Close search" data-close-search></button>
    <div class="search-modal-panel" role="dialog" aria-modal="true" aria-label="Archive search">
      <div class="search-modal-head">
        <p class="terminal-prompt">&gt; search</p>
        <button class="link-button" type="button" data-close-search>Close</button>
      </div>
      <form class="modal-search-form" action="/search" method="get" hx-get="/search" hx-target="#global-search-results" hx-trigger="input changed delay:100ms from:input, search, submit">
        <input type="hidden" name="picker" value="true">
        <input class="search-input" type="search" name="q" placeholder="Search archive..." value="" autocomplete="off" autocapitalize="none" spellcheck="false" data-primary-search data-command-search>
      </form>
      <div id="global-search-results" class="command-search-results"></div>
    </div>
  </section>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
