{% extends "base.html" %}
{% block title %}{{ "Edit" if category else "New" }} Category - Records{% endblock %}
{% block content %}
<div class="page-title">
  <h1>{{ "Edit" if category else "New" }} Category</h1>
</div>
<section class="panel narrow">
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form class="record-form" action="{{ '/categories/' ~ category.id if category else '/categories' }}" method="post">
    <label>Name <input required name="name" value="{{ category.name if category else '' }}"></label>
    <label>Description <textarea name="description" rows="5">{{ category.description if category else '' }}</textarea></label>
    <div class="form-actions">
      <button type="submit">Save category</button>
      <a class="button secondary" href="/categories">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
