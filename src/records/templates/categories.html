{% extends "base.html" %}
{% block title %}Categories - Records{% endblock %}
{% block content %}
<div class="page-title">
  <div>
    <p class="terminal-prompt">&gt; categories</p>
    <h1>Categories</h1>
    <p class="muted">Collections that hold entries.</p>
  </div>
  <a class="button" href="/categories/new">New category</a>
</div>

<section class="panel category-console">
  <form class="category-toolbar" action="/categories" method="get" hx-get="/categories" hx-target="#category-list" hx-trigger="input changed delay:150ms from:input, change, submit">
    <input class="search-input" type="search" name="q" value="{{ query }}" placeholder="Filter categories..." autocomplete="off" autocapitalize="none" spellcheck="false">
    <div class="segmented" aria-label="Sort categories">
      <label>
        <input type="radio" name="sort" value="created" {% if sort == "created" %}checked{% endif %}>
        <span>Created</span>
      </label>
      <label>
        <input type="radio" name="sort" value="name" {% if sort == "name" %}checked{% endif %}>
        <span>Name</span>
      </label>
    </div>
    <button type="submit">Apply</button>
  </form>
  <div id="category-list">
    {% include "partials/category_list.html" %}
  </div>
</section>
{% endblock %}
