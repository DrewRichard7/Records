{% extends "base.html" %}
{% block title %}Search - Records{% endblock %}
{% block content %}
<div class="page-title search-page-title">
  <div>
    <h1>Search</h1>
    <p class="muted">Ranked archive search across titles, categories, creators, tags, notes, links, and file names.</p>
  </div>
</div>
<section class="panel search-console compact">
  <form class="filterbar wrap" action="/search" method="get" hx-get="/search" hx-target="#search-results" hx-trigger="input changed delay:250ms from:input, change, submit">
    <input class="search-input" type="search" name="q" value="{{ query }}" placeholder="Search archive..." autocomplete="off" autocapitalize="none" spellcheck="false" data-primary-search>
    <select name="category_id">
      <option value="">All categories</option>
      {% for category in categories %}<option value="{{ category.id }}" {% if category.id == category_id %}selected{% endif %}>{{ category.name }}</option>{% endfor %}
    </select>
    <select name="creator">
      <option value="">All creators</option>
      {% for creator in creators %}<option value="{{ creator }}" {% if creator == selected_creator %}selected{% endif %}>{{ creator }}</option>{% endfor %}
    </select>
    <select name="tag">
      <option value="">All tags</option>
      {% for tag in tags %}<option value="{{ tag }}" {% if tag == selected_tag %}selected{% endif %}>{{ tag }}</option>{% endfor %}
    </select>
    <button type="submit">Search</button>
  </form>
  <div id="search-results">
    {% include "partials/search_results.html" %}
  </div>
</section>
{% endblock %}
