{% extends "base.html" %}
{% block title %}Reset password - Records{% endblock %}
{% block content %}
<section class="panel auth-panel">
  <p class="eyebrow">Private archive</p>
  <h1>Reset password</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  {% if valid %}
    <form class="record-form" action="/reset-password" method="post">
      <input type="hidden" name="token" value="{{ token }}">
      <label>New password
        <input required name="password" type="password" autocomplete="new-password" autofocus>
      </label>
      <label>Confirm password
        <input required name="confirm_password" type="password" autocomplete="new-password">
      </label>
      <div class="form-actions">
        <button type="submit">Reset password</button>
      </div>
    </form>
  {% else %}
    <p><a href="/forgot-password">Request a new reset link</a></p>
  {% endif %}
</section>
{% endblock %}
